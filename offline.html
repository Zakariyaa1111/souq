<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2355D4">
<title>أنت غير متصل — Souq-Kom</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0A0F1E 0%,#1a1035 60%,#0d1a3e 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:#fff;text-align:center;padding:24px;
}
.wrap{max-width:420px}
.icon{font-size:5rem;margin-bottom:24px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:1.8rem;font-weight:900;margin-bottom:12px;letter-spacing:-1px}
p{font-size:.9rem;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#2355D4,#0891B2);
  color:#fff;padding:14px 32px;border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:.92rem;font-weight:800;
  border:none;cursor:pointer;text-decoration:none;
  box-shadow:0 8px 24px rgba(35,85,212,.4);
  transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(35,85,212,.5)}
.status{margin-top:24px;font-size:.75rem;color:rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#EF4444;
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.cached-pages{margin-top:32px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px;
  text-align:right}
.cached-pages h3{font-size:.78rem;font-weight:800;color:rgba(255,255,255,.5);
  margin-bottom:12px;text-align:center;letter-spacing:1px;text-transform:uppercase}
.page-link{display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:8px;color:rgba(255,255,255,.7);text-decoration:none;
  font-size:.82rem;font-weight:700;transition:background .2s}
.page-link:hover{background:rgba(255,255,255,.08)}
.page-link span{font-size:1rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>
    لا يوجد اتصال بالإنترنت حالياً.<br>
    يمكنك تصفح الصفحات المخزنة مسبقاً أو الانتظار حتى يعود الاتصال.
  </p>
  
  <button class="btn" onclick="tryReconnect()">
    🔄 إعادة المحاولة
  </button>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">جاري التحقق من الاتصال...</span>
  </div>

  <div class="cached-pages">
    <h3>📦 الصفحات المتاحة بدون إنترنت</h3>
    <a class="page-link" href="/index.html"><span>🏪</span> الصفحة الرئيسية</a>
    <a class="page-link" href="/ads.html"><span>📋</span> الإعلانات</a>
    <a class="page-link" href="/seller.html"><span>🛍️</span> لوحة البائع</a>
    <a class="page-link" href="/privacy.html"><span>🔐</span> سياسة الخصوصية</a>
    <a class="page-link" href="/terms.html"><span>📄</span> شروط الاستخدام</a>
  </div>
</div>

<script>
function tryReconnect() {
  var btn = document.querySelector('.btn');
  btn.textContent = '⏳ جاري الاتصال...';
  btn.disabled = true;
  
  fetch('/index.html', { cache: 'no-store' })
    .then(function() {
      window.location.href = '/';
    })
    .catch(function() {
      btn.innerHTML = '🔄 إعادة المحاولة';
      btn.disabled = false;
      document.getElementById('statusText').textContent = 'لا يزال غير متصل';
    });
}

// Auto check connection every 10 seconds
function checkConnection() {
  fetch('/manifest.json', { cache: 'no-store' })
    .then(function() {
      document.getElementById('statusDot').style.background = '#10B981';
      document.getElementById('statusText').textContent = 'تم استعادة الاتصال — جاري التحديث...';
      setTimeout(function() { window.location.reload(); }, 1500);
    })
    .catch(function() {
      document.getElementById('statusDot').style.background = '#EF4444';
      document.getElementById('statusText').textContent = 'لا يوجد اتصال بالإنترنت';
    });
}

checkConnection();
setInterval(checkConnection, 10000);

// Listen for online event
window.addEventListener('online', function() {
  document.getElementById('statusText').textContent = 'عاد الاتصال! جاري التحديث...';
  setTimeout(function() { window.location.href = '/'; }, 1000);
});
</script>
</body>
</html>
