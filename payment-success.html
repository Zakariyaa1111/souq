<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>تم الدفع بنجاح | Souq-Kom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2355D4;--green:#059669;--text:#18202E;--muted:#6B7A99;--bg:#F4F6FA;--card:#fff;--bdr:#E2E8F4}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* ── Animated checkmark ── */
.success-wrap{text-align:center;max-width:480px;width:100%}
.circle{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--green),#10B981);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both;box-shadow:0 8px 32px rgba(5,150,105,.3)}
.circle svg{width:48px;height:48px;stroke:#fff;stroke-width:3;fill:none;stroke-dasharray:100;stroke-dashoffset:100;animation:drawCheck .5s ease .4s forwards}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes drawCheck{to{stroke-dashoffset:0}}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.c{position:absolute;top:-20px;border-radius:3px;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Card ── */
.card{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:36px;box-shadow:0 8px 40px rgba(0,0,0,.1);position:relative;z-index:1}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;background:rgba(5,150,105,.1);color:var(--green);border:1px solid rgba(5,150,105,.2);border-radius:20px;font-size:.78rem;font-weight:800;margin-bottom:14px}
h1{font-size:1.5rem;font-weight:900;margin-bottom:8px;color:var(--text)}
.sub{font-size:.88rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
.info-box{background:var(--bg);border:1.5px solid var(--bdr);border-radius:13px;padding:16px;margin-bottom:22px;text-align:right}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:.83rem}
.info-row:last-child{border:none;font-weight:800;font-size:.92rem}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{color:var(--text)}
.info-row.total span:last-child{color:var(--green);font-size:1.05rem}
.actions{display:flex;flex-direction:column;gap:10px}
.btn-main{padding:13px;background:linear-gradient(135deg,var(--blue),#0891B2);color:#fff;border-radius:12px;font-weight:800;font-size:.92rem;cursor:pointer;border:none;width:100%;transition:.2s}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(35,85,212,.3)}
.btn-sec{padding:12px;background:none;border:1.5px solid var(--bdr);color:var(--muted);border-radius:12px;font-weight:700;font-size:.88rem;cursor:pointer;width:100%}
.btn-sec:hover{border-color:var(--blue);color:var(--blue)}
.footer-note{font-size:.72rem;color:var(--muted);margin-top:18px;text-align:center;line-height:1.6}
.footer-note a{color:var(--blue)}
</style>
</head>
<body>

<!-- خلفية احتفالية -->
<div class="confetti" id="confettiContainer"></div>

<div class="success-wrap">
  <div class="circle">
    <svg viewBox="0 0 52 52">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14 26l8 8 16-16"/>
    </svg>
  </div>

  <div class="card">
    <div class="tag">✓ مدفوع بنجاح</div>
    <h1>تم استلام دفعتك!</h1>
    <p class="sub">شكراً على ثقتك. تمت معالجة دفعتك بنجاح عبر YouCan Pay وسيصلك تأكيد على بريدك الإلكتروني.</p>

    <div class="info-box">
      <div class="info-row">
        <span>رقم الطلب</span>
        <span id="orderId" style="font-family:monospace;direction:ltr">—</span>
      </div>
      <div class="info-row">
        <span>طريقة الدفع</span>
        <span>💳 YouCan Pay</span>
      </div>
      <div class="info-row">
        <span>التاريخ</span>
        <span id="payDate">—</span>
      </div>
      <div class="info-row total">
        <span>المبلغ المدفوع</span>
        <span id="payAmount">—</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-main" onclick="location.href='index.html'">🛍 متابعة التسوق</button>
      <button class="btn-sec" onclick="location.href='index.html#orders'">📦 تتبع طلباتي</button>
    </div>

    <p class="footer-note">
      في حالة أي استفسار: <a href="/cdn-cgi/l/email-protection#89fafcf9f9e6fbfdc9fae6fcf8a4e2e6e4a7e4e8"><span class="__cf_email__" data-cfemail="ea999f9a9a85989eaa99859f9bc7818587c4878b">[email&#160;protected]</span></a><br>
      حقك في الاسترجاع: 7 أيام وفق <a href="refund.html">سياسة الاسترجاع</a> (القانون 31-08)
    </p>
  </div>
</div>
