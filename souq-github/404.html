<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2355D4">
<title>404 — الصفحة غير موجودة | Souq-Kom</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oxanium:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:#060912;color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:24px;
}
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 50% 60% at 20% 50%,rgba(35,85,212,.15) 0%,transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 30%,rgba(0,200,255,.08) 0%,transparent 70%);
}
.wrap{position:relative;z-index:1;text-align:center;max-width:440px}
.num{
  font-family:'Oxanium',sans-serif;
  font-size:clamp(6rem,20vw,9rem);
  font-weight:800;line-height:1;
  background:linear-gradient(135deg,#fff 0%,#00e5ff 50%,#1246f0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 40px rgba(0,200,255,.3));
  animation:float 4s ease-in-out infinite;
  margin-bottom:8px;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.emoji{font-size:3rem;margin-bottom:16px;display:block;animation:float 4s ease-in-out infinite .5s}
h1{font-size:1.4rem;font-weight:900;margin-bottom:10px}
p{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:32px}
.links{display:flex;flex-direction:column;gap:10px}
.btn-main{
  padding:13px;background:linear-gradient(135deg,#1246f0,#0088ff);
  border:none;border-radius:14px;color:#fff;
  font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
  cursor:pointer;text-decoration:none;display:block;
  box-shadow:0 8px 28px rgba(18,70,240,.4);
  transition:transform .2s;
}
.btn-main:hover{transform:translateY(-2px)}
.btn-ghost{
  padding:11px;background:transparent;
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  color:rgba(255,255,255,.45);font-family:'Cairo',sans-serif;
  font-size:.85rem;font-weight:700;text-decoration:none;display:block;
  transition:all .2s;
}
.btn-ghost:hover{border-color:rgba(0,229,255,.3);color:rgba(0,229,255,.8)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <span class="emoji">🗺️</span>
  <div class="num">404</div>
  <h1>الصفحة غير موجودة</h1>
  <p>يبدو أن هذه الصفحة لا وجود لها أو تم نقلها.<br>لكن لا تقلق — السوق كله في انتظارك!</p>
  <div class="links">
    <a href="/" class="btn-main">🏪 العودة إلى الرئيسية</a>
    <a href="/ads.html" class="btn-ghost">📋 تصفح الإعلانات</a>
    <a href="/seller.html" class="btn-ghost">🛍️ لوحة البائع</a>
  </div>
</div>
</body>
</html>
